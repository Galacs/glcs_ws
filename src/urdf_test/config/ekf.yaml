ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    two_d_mode: true
    publish_tf: true
    process_noise_covariance: [0.05, 0.05, 0.06, 0.03, 0.03, 0.06,
                               0.025, 0.025, 0.04, 0.01, 0.01, 0.02,
                               0.01, 0.01, 0.015]

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: map
    odom0: /odom
    odom0_differential: true
    odom0_config: [true,  true, false,
                   false, false, true,
                   false, false, false,
                   false, false, false,
                   false, false, false]

    pose0: /pose
    pose0_config: [true,  true,  false,  # x, y
                   false, false, true,   # yaw
                   false, false, false,
                   false, false, false,
                   false, false, false]
    pose0_rejection_threshold: 2.0